name: Deploy MkDocs Documentation

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper git info

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs-mkdocs/requirements.txt
          pip install -e .  # Install fennel for mkdocstrings

      - name: Build and deploy documentation
        run: mkdocs gh-deploy --force --clean --verbose

      - name: Summary
        run: |
          echo "📚 Documentation deployed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View at: https://meighenbergers.github.io/fennel/" >> $GITHUB_STEP_SUMMARY

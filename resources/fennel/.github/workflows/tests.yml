name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']
        exclude:
          # JAX doesn't support Windows, so skip JAX tests on Windows
          - os: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]

    - name: Run unit and integration tests
      run: |
        pytest tests/ -v -m "not jax and not slow" --cov=fennel --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}

  test-jax:
    name: Test with JAX on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies with JAX
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test,cpu]

    - name: Run JAX tests
      run: |
        pytest tests/ -v -m "jax" --cov=fennel --cov-report=xml --cov-report=term

  test-physics:
    name: Physics Regression Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]

    - name: Generate reference values (if needed)
      run: |
        python -c "
        import os
        if not os.path.exists('tests/reference_values_v1.3.4.json'):
            from tests.test_physics_regression import save_reference_values
            save_reference_values()
        "

    - name: Run physics regression tests
      run: |
        pytest tests/test_physics_regression.py -v -m physics

    - name: Archive reference values
      uses: actions/upload-artifact@v4
      with:
        name: reference-values
        path: tests/reference_values_v1.3.4.json
        retention-days: 90

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 fennel --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 fennel --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
